name: Compile Rules to sing-box SRS & mihomo MRS

permissions:
  contents: write

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'Ruleset/**'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'Ruleset/**'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sing-box
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  SING_ARCH="amd64" ;;
            aarch64) SING_ARCH="arm64" ;;
            *)       echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          LATEST_TAG=$(curl -sSfL https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": "\(.*\)".*/\1/')
          VER="${LATEST_TAG#v}"
          DOWNLOAD_URL="https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/sing-box-${VER}-linux-${SING_ARCH}.tar.gz"
          echo "Downloading sing-box from: $DOWNLOAD_URL"
          curl -fsSL "$DOWNLOAD_URL" -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          SB=$(find . -name 'sing-box' -type f | head -1)
          chmod +x "$SB"
          sudo mv "$SB" /usr/local/bin/sing-box
          sing-box version

      - name: Setup mihomo
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  MIHOMO_ARCH="amd64" ;;
            aarch64) MIHOMO_ARCH="arm64" ;;
            *)       echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          LATEST_TAG=$(curl -sSfL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": "\(.*\)".*/\1/')
          VER="${LATEST_TAG#v}"
          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_TAG}/mihomo-linux-${MIHOMO_ARCH}-v${VER}.gz"
          echo "Downloading mihomo from: $DOWNLOAD_URL"
          curl -fsSL "$DOWNLOAD_URL" -o mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo
          mihomo -v

      - name: Convert rulesets to sing-box SRS
        run: |
          rm -rf sing-box
          mkdir -p sing-box
          bash scripts/convert-ruleset.sh Ruleset sing-box
          if compgen -G "Ruleset/Extra/*.list" > /dev/null; then
            bash scripts/convert-ruleset.sh Ruleset/Extra sing-box
          fi

      - name: Convert rulesets to mihomo MRS
        run: |
          rm -rf mihomo-rules
          mkdir -p mihomo-rules
          bash scripts/convert-mrs.sh Ruleset mihomo-rules
          if compgen -G "Ruleset/Extra/*.list" > /dev/null; then
            bash scripts/convert-mrs.sh Ruleset/Extra mihomo-rules
          fi

      - name: Commit and push
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sing-box/ mihomo-rules/
          if git diff --cached --quiet; then
            echo "No changes to sing-box/ or mihomo-rules/ — skipping commit."
          else
            git commit -m "ci: update rule-sets (sing-box SRS, mihomo MRS)"
            git push
          fi
